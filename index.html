<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Israel Contreras — Remodelaciones El Negro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { overflow-x: hidden; background: #070b18; }
    a { color: inherit; text-decoration: none; }
    img { display: block; max-width: 100%; }

    :root {
      --navy:   #0b0f1e;
      --dark:   #070b18;
      --indigo: #6366f1;
      --light:  #a5b4fc;
      --white:  #f0f0ff;
      --muted:  rgba(240,240,255,0.5);
      --strong: 'Oswald', Arial, sans-serif;
      --sans:   Arial, Helvetica, sans-serif;
    }

    body {
      background: var(--dark);
      min-height: 100vh;
      padding: 20px 20px 24px;
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ── Card shell ── */
    .card {
      background: var(--navy);
      color: var(--white);
      width: 100%;
      max-width: 420px;
      margin-left: auto;
      margin-right: auto;
      border-radius: 4px;
      border: 2px solid var(--indigo);
      overflow: hidden;
    }

    /* ── Top band ── */
    .card-top {
      padding: 28px 32px 24px;
      text-align: center;
      border-bottom: 1px solid rgba(99,102,241,0.3);
      position: relative;
    }

    .card-icon {
      width: 150px;
      height: auto;
      margin: 0 auto 18px;
    }

    .card-brand {
      font-family: var(--strong);
      font-weight: 700;
      font-size: 1.15rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      background: var(--white);
      color: var(--navy);
      padding: 10px 32px;
      margin: 0 -32px 20px;
    }

    .card-name {
      font-family: var(--strong);
      font-weight: 700;
      font-size: clamp(2rem, 8vw, 2.6rem);
      line-height: 1.05;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--white);
      margin-bottom: 6px;
    }

    .card-role {
      font-family: var(--strong);
      font-weight: 400;
      font-size: 0.72rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--light);
      margin-bottom: 14px;
    }

    .card-tagline {
      font-family: var(--strong);
      font-weight: 500;
      font-size: 1rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--white);
      opacity: 0.85;
      line-height: 1.4;
      margin-bottom: 4px;
    }

    .card-sub {
      font-family: var(--sans);
      font-size: 0.68rem;
      color: var(--muted);
      line-height: 1.5;
    }

    /* ── Services strip ── */
    .card-services {
      padding: 13px 20px;
      text-align: center;
      background: var(--indigo);
      font-family: var(--strong);
      font-weight: 500;
      font-size: 0.72rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--white);
    }

    /* ── Contact buttons ── */
    .card-contact {
      padding: 18px 28px 22px;
      display: flex;
      flex-direction: column;
      gap: 9px;
    }

    .contact-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 16px;
      border-radius: 3px;
      font-family: var(--sans);
      font-size: 0.82rem;
      transition: opacity 0.18s ease;
      background: linear-gradient(180deg, #1a1f3a 0%, #0d1028 100%);
      box-shadow: inset 0 1px 0 rgba(165,180,252,0.12), inset 0 -1px 0 rgba(0,0,0,0.3);
      border: 1px solid rgba(99,102,241,0.35);
      color: var(--white);
    }

    .contact-btn:hover { opacity: 0.75; }

    .contact-btn-icon {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      opacity: 0.9;
    }

    .contact-btn-label {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .contact-btn-type {
      font-size: 0.62rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--light);
      opacity: 0.75;
    }

    .contact-btn-value {
      font-family: var(--strong);
      font-weight: 500;
      font-size: 1rem;
      color: var(--white);
    }

    /* ── Corner bracket accents ── */
    .bracket {
      position: absolute;
      width: 16px;
      height: 16px;
      border-color: var(--indigo);
      border-style: solid;
      opacity: 0.6;
    }

    .bracket--tl { top: 10px; left: 10px; border-width: 2px 0 0 2px; }
    .bracket--tr { top: 10px; right: 10px; border-width: 2px 2px 0 0; }
    .bracket--bl { bottom: 10px; left: 10px; border-width: 0 0 2px 2px; }
    .bracket--br { bottom: 10px; right: 10px; border-width: 0 2px 2px 0; }
  </style>
</head>
<body>

  <div class="card">

    <div class="card-top">
      <div class="bracket bracket--tl"></div>
      <div class="bracket bracket--tr"></div>

      <!-- Crossed sledgehammers icon -->
      <svg class="card-icon" viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <g fill="#a5b4fc">
          <!-- Left hammer, rotated -38deg around center -->
          <g transform="rotate(-38, 80, 80)">
            <rect x="54" y="14" width="52" height="24" rx="5"/>
            <rect x="74" y="36" width="12" height="90" rx="5"/>
          </g>
          <!-- Right hammer, rotated +38deg around center -->
          <g transform="rotate(38, 80, 80)">
            <rect x="54" y="14" width="52" height="24" rx="5"/>
            <rect x="74" y="36" width="12" height="90" rx="5"/>
          </g>
        </g>
      </svg>

      <p class="card-brand">Remodelaciones &ldquo;El Negro&rdquo;</p>
      <h1 class="card-name">Israel Contreras</h1>
      <p class="card-role">Maestro Remodelador</p>
      <p class="card-tagline">Tu hogar, nuestra obra</p>
      <p class="card-sub">Remodelaciones y construcción a tu medida</p>

      <div class="bracket bracket--bl"></div>
      <div class="bracket bracket--br"></div>
    </div>

    <div class="card-services">
      Electricidad &nbsp;·&nbsp; Albañilería &nbsp;·&nbsp; Pisos &nbsp;·&nbsp; Pintura
    </div>

    <div class="card-contact">

      <a class="contact-btn"
         href="https://wa.me/5217771113757"
         target="_blank" rel="noopener noreferrer">
        <!-- WhatsApp icon -->
        <svg class="contact-btn-icon" viewBox="0 0 24 24" fill="#a5b4fc" xmlns="http://www.w3.org/2000/svg">
          <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
        </svg>
        <span class="contact-btn-label">
          <span class="contact-btn-type">WhatsApp</span>
          <span class="contact-btn-value">+52 1 777 111 3757</span>
        </span>
      </a>

    </div>

  </div>

</body>
</html>
